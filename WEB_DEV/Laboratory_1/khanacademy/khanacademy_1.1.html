    <body>
        <h1 align = "center">Programmer</h1>
        <p align = "center"> He speaks in loops and dreams in code,<br>
A quiet mind on logic's road.<br>
Through bugs and night, the screen's soft glow,<br>
He builds small worlds that few will know.<br>
With every fix, the chaos calms<br>
A poet's heart in binary psalms.
</p>
