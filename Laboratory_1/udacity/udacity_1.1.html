<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Button</title>
    <style>
       button{
        background-color: blue;
        color: white;
        position: absolute;
        left: 300px;
        top: 30px;
        width: 200px;
        height: 100px;
        font-size: 32px;
        border: 2px outset blue;
       }
       button:active{
        background-color: #00ACff;
        border: 2px inset #00ACff;
       }

    </style>
</head>
<body>
   <button type = "button">A Button</button>

</body>


</html>
