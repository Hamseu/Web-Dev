<div class="rating">
  <span class = "value-rating">{{value}}</span>
  <span class="star">
    @for (star of stars; track star) {
      <span class="star-container">
        <span class="star-empty">★</span>
        <span 
          class="star-fill" 
          [style.width.%]="getFillPercent(star)">
          ★
        </span>
      </span>
    }
  </span>
  
</div>
